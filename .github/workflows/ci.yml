name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and dev dependencies
        run: python -m pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Pytest
        run: pytest --cov=src/pr_agent_context --cov-branch --cov-report=xml --cov-report=term
      - name: Verify raw coverage data exists
        if: ${{ success() }}
        run: |
          shopt -s nullglob dotglob
          files=(.coverage*)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::pytest succeeded but no raw .coverage* files were produced."
            exit 1
          fi
      - name: Upload raw coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-agent-context-coverage-py${{ matrix.python-version }}
          path: .coverage*
          include-hidden-files: true
          if-no-files-found: ignore
      - name: Upload coverage reports to Codecov
        if: ${{ always() && env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: py${{ matrix.python-version }}
          name: py${{ matrix.python-version }}

  pr-agent-context:
    name: PR agent context
    if: ${{ always() && github.event_name == 'pull_request' }}
    needs: [test]
    permissions:
      contents: read
      actions: read
      pull-requests: write
    uses: shaypal5/pr-agent-context/.github/workflows/pr-agent-context.yml@v4.0.3
    with:
      tool_ref: v4.0.3
      target_patch_coverage: "100"
      include_review_comments: true
      include_failing_checks: true
      include_patch_coverage: true
      coverage_artifact_prefix: pr-agent-context-coverage
      debug_artifacts: true
