name: PR Agent Context

on:
  workflow_call:
    inputs:
      tool_ref:
        description: Ref of shaypal5/pr-agent-context to check out.
        required: false
        default: v2
        type: string
      include_review_comments:
        description: Include unresolved PR review threads.
        required: false
        default: true
        type: boolean
      include_failing_checks:
        description: Include failing checks in the rendered prompt.
        required: false
        default: true
        type: boolean
      include_cross_run_failures:
        description: Expand Actions failure collection from the current run to PR-head-SHA-wide failed runs/jobs.
        required: false
        default: true
        type: boolean
      include_external_checks:
        description: Include failed external check runs and commit statuses for the PR head SHA.
        required: false
        default: true
        type: boolean
      wait_for_checks_to_settle:
        description: Briefly poll the PR head SHA check universe so late-arriving checks can appear before collection.
        required: false
        default: true
        type: boolean
      prompt_preamble:
        description: Optional text inserted before the default prompt preamble.
        required: false
        default: ""
        type: string
      prompt_template_file:
        description: Optional template file path in the caller repository workspace.
        required: false
        default: ""
        type: string
      max_review_threads:
        description: Maximum unresolved review threads to include.
        required: false
        default: 50
        type: number
      max_actions_jobs:
        description: Maximum failed Actions jobs to include after aggregation and dedupe.
        required: false
        default: 20
        type: number
      max_actions_runs:
        description: Maximum completed workflow runs to inspect for the PR head SHA.
        required: false
        default: 20
        type: number
      max_external_checks:
        description: Maximum failed external check/status items to include after normalization.
        required: false
        default: 20
        type: number
      max_failing_checks:
        description: Maximum total failing-check items to render after dedupe.
        required: false
        default: 25
        type: number
      max_log_lines_per_job:
        description: Maximum log excerpt lines per failed job.
        required: false
        default: 80
        type: number
      check_settle_timeout_seconds:
        description: Maximum seconds to wait for the PR head SHA check universe to settle before collecting failures.
        required: false
        default: 45
        type: number
      check_settle_poll_interval_seconds:
        description: Poll interval in seconds while waiting for the PR head SHA check universe to settle.
        required: false
        default: 5
        type: number
      characters_per_line:
        description: Maximum display width for wrapped prose lines in rendered output.
        required: false
        default: 100
        type: number
      target_patch_coverage:
        description: Required patch coverage percentage for changed executable Python lines.
        required: false
        default: "100"
        type: string
      include_patch_coverage:
        description: Include patch coverage analysis from uploaded coverage artifacts.
        required: false
        default: true
        type: boolean
      coverage_artifact_prefix:
        description: Artifact name prefix used for raw coverage.py data uploads.
        required: false
        default: pr-agent-context-coverage
        type: string
      force_patch_coverage_section:
        description: Render the patch coverage section even when it is not actionable.
        required: false
        default: false
        type: boolean
      copilot_author_patterns:
        description: Comma- or newline-separated exact logins and re:regex matchers for Copilot review actors.
        required: false
        default: ""
        type: string
      debug_artifacts:
        description: Upload structured debug artifacts for inspection and automation.
        required: false
        default: true
        type: boolean
      debug_artifact_prefix:
        description: Prefix for uploaded debug artifacts.
        required: false
        default: pr-agent-context-debug
        type: string
      delete_comment_when_empty:
        description: Delete managed comments when there is no actionable content.
        required: false
        default: true
        type: boolean
      skip_comment_on_readonly_token:
        description: Skip comment mutation when the token cannot write.
        required: false
        default: true
        type: boolean
    outputs:
      comment_id:
        description: The managed PR comment ID, if a comment exists after the run.
        value: ${{ jobs.pr-agent-context.outputs.comment_id }}
      comment_url:
        description: The managed PR comment URL, if a comment exists after the run.
        value: ${{ jobs.pr-agent-context.outputs.comment_url }}
      unresolved_thread_count:
        description: Count of unresolved review threads included in the prompt.
        value: ${{ jobs.pr-agent-context.outputs.unresolved_thread_count }}
      failing_check_count:
        description: Count of failing-check items included in the prompt.
        value: ${{ jobs.pr-agent-context.outputs.failing_check_count }}
      has_actionable_items:
        description: Whether the rendered prompt contains actionable content.
        value: ${{ jobs.pr-agent-context.outputs.has_actionable_items }}
      patch_coverage_percent:
        description: Computed patch coverage percentage, if applicable.
        value: ${{ jobs.pr-agent-context.outputs.patch_coverage_percent }}
      prompt_sha256:
        description: SHA-256 of the rendered prompt markdown.
        value: ${{ jobs.pr-agent-context.outputs.prompt_sha256 }}
      comment_written:
        description: Whether a managed PR comment exists after the run.
        value: ${{ jobs.pr-agent-context.outputs.comment_written }}

jobs:
  pr-agent-context:
    name: PR agent context
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      pull-requests: write
    outputs:
      comment_id: ${{ steps.run_tool.outputs.comment_id }}
      comment_url: ${{ steps.run_tool.outputs.comment_url }}
      unresolved_thread_count: ${{ steps.run_tool.outputs.unresolved_thread_count }}
      failing_check_count: ${{ steps.run_tool.outputs.failing_check_count }}
      has_actionable_items: ${{ steps.run_tool.outputs.has_actionable_items }}
      patch_coverage_percent: ${{ steps.run_tool.outputs.patch_coverage_percent }}
      prompt_sha256: ${{ steps.run_tool.outputs.prompt_sha256 }}
      comment_written: ${{ steps.run_tool.outputs.comment_written }}
    steps:
      - name: Check out caller repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: caller-repo

      - name: Check out pr-agent-context
        uses: actions/checkout@v4
        with:
          repository: shaypal5/pr-agent-context
          ref: ${{ inputs.tool_ref }}
          path: pr-agent-context

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pr-agent-context
        run: python -m pip install ./pr-agent-context

      - name: Download coverage artifacts
        if: ${{ inputs.include_patch_coverage }}
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ inputs.coverage_artifact_prefix }}*
          path: coverage-artifacts
          merge-multiple: true

      - name: Run pr-agent-context
        id: run_tool
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_AGENT_CONTEXT_TOOL_REF: ${{ inputs.tool_ref }}
          PR_AGENT_CONTEXT_WORKSPACE: ${{ github.workspace }}/caller-repo
          PR_AGENT_CONTEXT_INCLUDE_REVIEW_COMMENTS: ${{ inputs.include_review_comments }}
          PR_AGENT_CONTEXT_INCLUDE_FAILING_CHECKS: ${{ inputs.include_failing_checks }}
          PR_AGENT_CONTEXT_INCLUDE_CROSS_RUN_FAILURES: ${{ inputs.include_cross_run_failures }}
          PR_AGENT_CONTEXT_INCLUDE_EXTERNAL_CHECKS: ${{ inputs.include_external_checks }}
          PR_AGENT_CONTEXT_WAIT_FOR_CHECKS_TO_SETTLE: ${{ inputs.wait_for_checks_to_settle }}
          PR_AGENT_CONTEXT_PROMPT_PREAMBLE: ${{ inputs.prompt_preamble }}
          PR_AGENT_CONTEXT_PROMPT_TEMPLATE_FILE: ${{ inputs.prompt_template_file }}
          PR_AGENT_CONTEXT_MAX_REVIEW_THREADS: ${{ inputs.max_review_threads }}
          PR_AGENT_CONTEXT_MAX_ACTIONS_RUNS: ${{ inputs.max_actions_runs }}
          PR_AGENT_CONTEXT_MAX_ACTIONS_JOBS: ${{ inputs.max_actions_jobs }}
          PR_AGENT_CONTEXT_MAX_EXTERNAL_CHECKS: ${{ inputs.max_external_checks }}
          PR_AGENT_CONTEXT_MAX_FAILING_CHECKS: ${{ inputs.max_failing_checks }}
          PR_AGENT_CONTEXT_MAX_LOG_LINES_PER_JOB: ${{ inputs.max_log_lines_per_job }}
          PR_AGENT_CONTEXT_CHECK_SETTLE_TIMEOUT_SECONDS: ${{ inputs.check_settle_timeout_seconds }}
          PR_AGENT_CONTEXT_CHECK_SETTLE_POLL_INTERVAL_SECONDS: ${{ inputs.check_settle_poll_interval_seconds }}
          PR_AGENT_CONTEXT_CHARACTERS_PER_LINE: ${{ inputs.characters_per_line }}
          PR_AGENT_CONTEXT_TARGET_PATCH_COVERAGE: ${{ inputs.target_patch_coverage }}
          PR_AGENT_CONTEXT_INCLUDE_PATCH_COVERAGE: ${{ inputs.include_patch_coverage }}
          PR_AGENT_CONTEXT_COVERAGE_ARTIFACT_PREFIX: ${{ inputs.coverage_artifact_prefix }}
          PR_AGENT_CONTEXT_FORCE_PATCH_COVERAGE_SECTION: ${{ inputs.force_patch_coverage_section }}
          PR_AGENT_CONTEXT_COPILOT_AUTHOR_PATTERNS: ${{ inputs.copilot_author_patterns }}
          PR_AGENT_CONTEXT_DEBUG_ARTIFACTS: ${{ inputs.debug_artifacts }}
          PR_AGENT_CONTEXT_DEBUG_ARTIFACT_PREFIX: ${{ inputs.debug_artifact_prefix }}
          PR_AGENT_CONTEXT_DELETE_COMMENT_WHEN_EMPTY: ${{ inputs.delete_comment_when_empty }}
          PR_AGENT_CONTEXT_SKIP_COMMENT_ON_READONLY_TOKEN: ${{ inputs.skip_comment_on_readonly_token }}
          PR_AGENT_CONTEXT_COVERAGE_ARTIFACTS_DIR: ${{ github.workspace }}/coverage-artifacts
          PR_AGENT_CONTEXT_DEBUG_ARTIFACTS_DIR: ${{ github.workspace }}/pr-agent-context-debug
        run: pr-agent-context run

      - name: Upload debug artifacts
        if: ${{ always() && inputs.debug_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.debug_artifact_prefix }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: pr-agent-context-debug
          if-no-files-found: warn
