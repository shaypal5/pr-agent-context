name: pyproject-validate

on:
  pull_request:
    # Keep this workflow dormant unless the PR touches pyproject metadata/config.
    paths:
      - pyproject.toml

permissions:
  contents: read

jobs:
  validate:
    name: Validate pyproject.toml
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install validator
        run: python -m pip install --upgrade "validate-pyproject[all]"

      - name: Validate pyproject.toml
        env:
          VALIDATE_PYPROJECT_NO_NETWORK: "1"
        run: validate-pyproject pyproject.toml
